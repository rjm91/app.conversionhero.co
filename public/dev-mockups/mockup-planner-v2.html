<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plans V2 — Itinerary / Journey</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0b14; --sidebar-bg: #0c0e18; --surface: #111528; --surface2: #171B33;
    --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.10);
    --text: #f3f5f9; --muted: #8b93a7; --dim: #59617a;
    --blue: #3b82f6; --green: #34CC93; --yellow: #f5c542; --red: #f87171;
    --orange: #fb923c; --indigo: #818cf8; --purple: #a78bfa; --teal: #2dd4bf;
    --radius: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }
  .sidebar { width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px 14px; flex-shrink: 0; }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 4px 6px 20px; }
  .sidebar-avatar { width: 30px; height: 30px; border-radius: 8px; background: var(--blue); display: grid; place-items: center; font-weight: 700; font-size: 12px; color: #fff; }
  .sidebar-brand span { font-weight: 600; font-size: 14px; }
  .nav-group-label { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; padding: 14px 12px 6px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 12px; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; border-radius: 8px; text-decoration: none; margin-bottom: 1px; }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: #fff; background: var(--blue); font-weight: 600; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .main { flex: 1; padding: 24px 32px; overflow-y: auto; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; }
  .page-header h1 { font-size: 24px; font-weight: 700; }
  .page-header .sub { font-size: 13px; color: var(--dim); margin-top: 3px; }
  .btn-new { display: flex; align-items: center; gap: 6px; padding: 10px 18px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }

  /* Summary strip */
  .summary { display: flex; gap: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 24px; margin-bottom: 28px; }
  .summary .blk .lbl { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
  .summary .blk .val { font-size: 22px; font-weight: 800; }
  .summary .blk .val.green { color: var(--green); } .summary .blk .val.blue { color: var(--indigo); }
  .summary .spacer { flex: 1; }
  .summary .yr { display: flex; align-items: center; gap: 10px; }
  .summary .yr button { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surface); color: var(--muted); cursor: pointer; }
  .summary .yr span { font-weight: 700; font-size: 15px; }

  /* Timeline */
  .timeline { position: relative; padding-left: 130px; }
  .timeline::before { content: ''; position: absolute; left: 96px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(var(--border2), var(--border)); }
  .leg { position: relative; margin-bottom: 14px; }
  .leg-date { position: absolute; left: -130px; top: 22px; width: 84px; text-align: right; }
  .leg-date .mo { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .leg-date .dy { font-size: 26px; font-weight: 800; line-height: 1; }
  .leg-date .en { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .node { position: absolute; left: -42px; top: 26px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid var(--bg); z-index: 2; }

  .stay-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
  .stay-card:hover { border-color: var(--border2); }
  .sc-hero { height: 74px; display: flex; align-items: flex-end; justify-content: space-between; padding: 14px 18px; }
  .sc-hero .nm { font-size: 17px; font-weight: 800; color: #fff; }
  .sc-hero .cum { background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; color: #fff; }
  .sc-body { padding: 16px 18px; }
  .sc-meta { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--muted); margin-bottom: 14px; flex-wrap: wrap; }
  .sc-meta a { color: var(--blue); text-decoration: none; }
  .sc-meta .pill { background: var(--surface2); padding: 4px 9px; border-radius: 6px; }
  .bars { display: flex; flex-direction: column; gap: 9px; }
  .bar-row { display: grid; grid-template-columns: 70px 1fr 56px; align-items: center; gap: 12px; font-size: 12px; }
  .bar-row .cat { color: var(--muted); }
  .bar-track { height: 8px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; }
  .bar-row .amt { text-align: right; font-weight: 700; }
  .sc-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .sc-foot .tot { font-size: 18px; font-weight: 800; }
  .sc-foot .tot small { font-size: 11px; color: var(--dim); font-weight: 600; }
  .sc-foot .pd { font-size: 12px; color: var(--green); font-weight: 700; }

  /* Flight connector */
  .flight-leg { position: relative; height: 58px; }
  .flight-pill { position: absolute; left: -54px; top: 14px; display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 22px; padding: 7px 14px; font-size: 12px; }
  .flight-pill .rt { font-weight: 700; } .flight-pill .mt { color: var(--dim); font-size: 11px; }

  .add-leg { position: relative; margin-top: 6px; }
  .add-btn { width: 100%; border: 1px dashed var(--border2); background: transparent; color: var(--dim); padding: 13px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .add-btn:hover { color: var(--muted); border-color: var(--muted); }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="sidebar-avatar">CH</div><span>ConversionHero</span></div>
    <div class="nav-group-label">Management</div>
    <a class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Clients</a>
    <a class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Projects</a>
    <a class="nav-item active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>Plans</a>
    <a class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Calendar</a>
  </aside>

  <main class="main">
    <div class="page-header">
      <div><h1>Plans</h1><div class="sub">Your journey ahead — one stay at a time, with the running cost as you go.</div></div>
      <button class="btn-new">+ New Stay</button>
    </div>

    <div class="summary">
      <div class="blk"><div class="lbl">Trip Budget</div><div class="val green" id="s-budget">$0</div></div>
      <div class="blk"><div class="lbl">Total Nights</div><div class="val" id="s-days">0</div></div>
      <div class="blk"><div class="lbl">Avg / Day</div><div class="val blue" id="s-perday">$0</div></div>
      <div class="blk"><div class="lbl">Stays</div><div class="val" id="s-stays">0</div></div>
      <div class="spacer"></div>
      <div class="yr"><button>‹</button><span>2026</span><button>›</button></div>
    </div>

    <div class="timeline" id="timeline"></div>
  </main>

<script>
const CATS = [
  { key: 'airbnb', label: 'Airbnb', color: '#a78bfa' },
  { key: 'food', label: 'Food', color: '#fb923c' },
  { key: 'personal', label: 'Personal', color: '#2dd4bf' },
  { key: 'fun', label: 'Fun', color: '#818cf8' },
];
const STAYS = [
  { id:1, name:'Old Town Loft', city:'Scottsdale, AZ', color:'#7c5cff', url:'#', start:'2026-06-09', end:'2026-06-16',
    cats:{airbnb:628,food:150,personal:80,fun:120}, flightIn:{route:'SAN → PHX', date:'2026-06-09', time:'8:40 AM', airline:'Southwest', price:96} },
  { id:2, name:'Chandler Pool Room', city:'Chandler, AZ', color:'#2dd4bf', url:'#', start:'2026-06-17', end:'2026-06-30',
    cats:{airbnb:669,food:280,personal:120,fun:200}, flightIn:null },
];
const MO=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function d(s){const[y,m,a]=s.split('-').map(Number);return new Date(y,m-1,a);}
function nights(s){return Math.round((d(s.end)-d(s.start))/86400000);}
function total(s){return Object.values(s.cats).reduce((a,b)=>a+b,0);}
function money(n){return '$'+Math.round(n).toLocaleString();}

const budget=STAYS.reduce((a,s)=>a+total(s),0), days=STAYS.reduce((a,s)=>a+nights(s),0);
document.getElementById('s-budget').textContent=money(budget);
document.getElementById('s-days').textContent=days;
document.getElementById('s-perday').textContent=money(budget/days);
document.getElementById('s-stays').textContent=STAYS.length;

let cum=0, html='';
STAYS.forEach((s,i)=>{
  if(s.flightIn){
    html+=`<div class="flight-leg"><div class="flight-pill"><span>✈️</span><span class="rt">${s.flightIn.route}</span>`+
      `<span class="mt">${s.flightIn.airline} · ${MO[d(s.flightIn.date).getMonth()]} ${d(s.flightIn.date).getDate()} · ${money(s.flightIn.price)}</span></div></div>`;
  }
  const n=nights(s), t=total(s); cum+=t;
  const max=Math.max(...Object.values(s.cats));
  const bars=CATS.map(c=>`<div class="bar-row"><span class="cat">${c.label}</span>`+
    `<div class="bar-track"><div class="bar-fill" style="width:${(s.cats[c.key]/max*100)}%;background:${c.color}"></div></div>`+
    `<span class="amt">${money(s.cats[c.key])}</span></div>`).join('');
  html+=`<div class="leg">`+
    `<div class="leg-date"><div class="mo">${MO[d(s.start).getMonth()]}</div><div class="dy">${d(s.start).getDate()}</div><div class="en">→ ${MO[d(s.end).getMonth()]} ${d(s.end).getDate()}</div></div>`+
    `<div class="node" style="background:${s.color}"></div>`+
    `<div class="stay-card">`+
      `<div class="sc-hero" style="background:linear-gradient(135deg,${s.color},#0a0b14)"><span class="nm">${s.name}</span><span class="cum">running: ${money(cum)}</span></div>`+
      `<div class="sc-body">`+
        `<div class="sc-meta"><span class="pill">📍 ${s.city}</span><span class="pill">${n} nights</span><a href="${s.url}">Airbnb ↗</a></div>`+
        `<div class="bars">${bars}</div>`+
        `<div class="sc-foot"><div class="tot">${money(t)} <small>this stay</small></div><div class="pd">${money(t/n)} / day</div></div>`+
      `</div>`+
    `</div></div>`;
});
html+=`<div class="add-leg"><button class="add-btn">+ Add next stay to the journey</button></div>`;
document.getElementById('timeline').innerHTML=html;
</script>
</body>
</html>
