<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plans V4 — Month-Zoom Gantt</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0b14; --sidebar-bg: #0c0e18; --surface: #111528; --surface2: #171B33;
    --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.10);
    --text: #f3f5f9; --muted: #8b93a7; --dim: #59617a;
    --blue: #3b82f6; --green: #34CC93; --yellow: #f5c542; --red: #f87171;
    --orange: #fb923c; --indigo: #818cf8; --purple: #a78bfa; --teal: #2dd4bf;
    --radius: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }
  .sidebar { width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px 14px; flex-shrink: 0; }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 4px 6px 20px; }
  .sidebar-avatar { width: 30px; height: 30px; border-radius: 8px; background: var(--blue); display: grid; place-items: center; font-weight: 700; font-size: 12px; color: #fff; }
  .sidebar-brand span { font-weight: 600; font-size: 14px; }
  .nav-group-label { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; padding: 14px 12px 6px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 12px; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; border-radius: 8px; text-decoration: none; margin-bottom: 1px; }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: #fff; background: var(--blue); font-weight: 600; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .main { flex: 1; padding: 24px 32px; overflow: hidden; display: flex; flex-direction: column; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
  .page-header h1 { font-size: 24px; font-weight: 700; }
  .page-header .sub { font-size: 13px; color: var(--dim); margin-top: 3px; }
  .btn-new { display: flex; align-items: center; gap: 6px; padding: 10px 18px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .period-nav { display: flex; align-items: center; gap: 12px; }
  .period-nav h2 { font-size: 17px; font-weight: 700; min-width: 170px; }
  .nav-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 14px; display: grid; place-items: center; }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .today-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; }
  .view-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 3px; gap: 2px; }
  .view-toggle button { padding: 6px 14px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 6px; }
  .view-toggle button.active { background: var(--blue); color: #fff; }

  /* Gantt frame */
  .gantt-frame { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .scroll { overflow-x: auto; overflow-y: hidden; flex: 1; scrollbar-width: thin; }
  .scroll::-webkit-scrollbar { height: 10px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }
  .canvas { position: relative; }

  /* month band */
  .month-band { display: flex; height: 30px; border-bottom: 1px solid var(--border2); position: sticky; top: 0; background: var(--surface); z-index: 5; }
  .month-seg { border-right: 1px solid var(--border2); font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; padding: 0 12px; position: sticky; }
  .month-seg span { position: sticky; left: 12px; }

  /* day axis */
  .day-axis { display: flex; height: 38px; border-bottom: 1px solid var(--border); position: sticky; top: 30px; background: var(--surface); z-index: 4; }
  .day-cell { flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .day-cell.weekend { background: rgba(255,255,255,0.018); }
  .day-cell .dn { font-size: 12px; font-weight: 700; }
  .day-cell .dw { font-size: 9px; color: var(--dim); text-transform: uppercase; }
  .day-cell.is-today .dn { background: var(--blue); color: #fff; width: 19px; height: 19px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; }

  /* lanes */
  .lanes { position: relative; }
  .grid-lines { position: absolute; inset: 0; display: flex; z-index: 0; }
  .grid-lines .gl { flex-shrink: 0; border-right: 1px solid var(--border); }
  .grid-lines .gl.weekend { background: rgba(255,255,255,0.018); }
  .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--blue); z-index: 3; opacity: 0.6; }
  .lane { position: relative; height: 56px; }
  .gbar { position: absolute; top: 8px; height: 40px; border-radius: 8px; padding: 0 12px; display: flex; flex-direction: column; justify-content: center; color: #fff; cursor: pointer; overflow: hidden; z-index: 2; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  .gbar:hover { filter: brightness(1.08); }
  .gbar .gnm { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gbar .gmeta { font-size: 10px; opacity: 0.9; white-space: nowrap; }
  .gflight { position: absolute; top: 18px; font-size: 14px; z-index: 3; transform: translateX(-50%); }

  /* footer summary */
  .gantt-foot { display: flex; gap: 26px; padding: 14px 18px; border-top: 1px solid var(--border); background: var(--surface); }
  .gantt-foot .blk .l { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .gantt-foot .blk .v { font-size: 17px; font-weight: 800; margin-top: 3px; }
  .gantt-foot .blk .v.green { color: var(--green); } .gantt-foot .blk .v.blue { color: var(--indigo); }
  .hint { margin-left: auto; align-self: center; font-size: 11px; color: var(--dim); }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="sidebar-avatar">CH</div><span>ConversionHero</span></div>
    <div class="nav-group-label">Management</div>
    <a class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Clients</a>
    <a class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Projects</a>
    <a class="nav-item active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Plans</a>
    <a class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Calendar</a>
  </aside>

  <main class="main">
    <div class="page-header">
      <div><h1>Plans</h1><div class="sub">Scroll the timeline left and right to move through your plan, day by day.</div></div>
      <button class="btn-new">+ New Stay</button>
    </div>

    <div class="toolbar">
      <div class="period-nav">
        <button class="nav-btn" id="prev">‹</button>
        <h2 id="period-label">June 2026</h2>
        <button class="nav-btn" id="next">›</button>
        <button class="today-btn" id="today">Today</button>
      </div>
      <div class="view-toggle">
        <button data-zoom="month" class="active">Month</button>
        <button data-zoom="quarter">Quarter</button>
        <button data-zoom="year">Year</button>
      </div>
    </div>

    <div class="gantt-frame">
      <div class="scroll" id="scroll">
        <div class="canvas" id="canvas"></div>
      </div>
      <div class="gantt-foot">
        <div class="blk"><div class="l">In View · <span id="f-month">June</span></div><div class="v green" id="f-spend">$0</div></div>
        <div class="blk"><div class="l">Nights</div><div class="v" id="f-nights">0</div></div>
        <div class="blk"><div class="l">Avg / Day</div><div class="v blue" id="f-day">$0</div></div>
        <div class="hint">↔ drag or scroll the timeline · click a bar for details</div>
      </div>
    </div>
  </main>

<script>
const STAYS = [
  { id:1, name:'Old Town Loft', city:'Scottsdale, AZ', color:'#7c5cff', url:'#', start:'2026-06-09', end:'2026-06-16',
    cats:{airbnb:628,food:150,personal:80,fun:120}, flightIn:{route:'SAN→PHX', date:'2026-06-09'} },
  { id:2, name:'Chandler Pool Room', city:'Chandler, AZ', color:'#2dd4bf', url:'#', start:'2026-06-17', end:'2026-06-30',
    cats:{airbnb:669,food:280,personal:120,fun:200}, flightIn:null },
  { id:3, name:'Sedona Casita', city:'Sedona, AZ', color:'#fb923c', url:'#', start:'2026-07-04', end:'2026-07-12',
    cats:{airbnb:910,food:200,personal:90,fun:260}, flightIn:null },
];
const MOF=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MOS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DW=['S','M','T','W','T','F','S'];

// timeline spans Apr 1 – Sep 30 2026 so there's room to scroll
const RANGE_START = new Date(2026,3,1);
const RANGE_END   = new Date(2026,8,30);
const TODAY = new Date(2026,5,4);

const ZOOM = { month:44, quarter:15, year:5 };
let zoom='month';
let cursor = new Date(2026,5,1); // June

function d(s){const[y,m,a]=s.split('-').map(Number);return new Date(y,m-1,a);}
function nights(s){return Math.round((d(s.end)-d(s.start))/86400000);}
function total(s){return Object.values(s.cats).reduce((a,b)=>a+b,0);}
function money(n){return '$'+Math.round(n).toLocaleString();}
function daysBetween(a,b){return Math.round((b-a)/86400000);}
function addDays(dt,n){const r=new Date(dt);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return a.toDateString()===b.toDateString();}

const totalDays = daysBetween(RANGE_START, RANGE_END)+1;

function build(){
  const cw = ZOOM[zoom];
  const width = totalDays*cw;
  const canvas = document.getElementById('canvas');

  // month band
  let band='';
  let cur=new Date(RANGE_START);
  while(cur<=RANGE_END){
    const mStart = new Date(cur.getFullYear(),cur.getMonth(),1);
    const mEnd = new Date(cur.getFullYear(),cur.getMonth()+1,0);
    const segStart = mStart<RANGE_START?RANGE_START:mStart;
    const segEnd = mEnd>RANGE_END?RANGE_END:mEnd;
    const w=(daysBetween(segStart,segEnd)+1)*cw;
    band+=`<div class="month-seg" style="width:${w}px"><span>${MOS[cur.getMonth()]} ${cur.getFullYear()}</span></div>`;
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }

  // day axis + grid lines
  let axis='', glines='';
  for(let i=0;i<totalDays;i++){
    const dt=addDays(RANGE_START,i);
    const we=dt.getDay()===0||dt.getDay()===6;
    const today=sameDay(dt,TODAY);
    const showLabel = zoom!=='year';
    axis+=`<div class="day-cell${we?' weekend':''}${today?' is-today':''}" style="width:${cw}px">`+
      (showLabel?`<div class="dn">${dt.getDate()}</div>`+(zoom==='month'?`<div class="dw">${DW[dt.getDay()]}</div>`:''):'')+`</div>`;
    glines+=`<div class="gl${we?' weekend':''}" style="width:${cw}px"></div>`;
  }

  // lanes — pack non-overlapping stays into rows
  const lanes=[];
  STAYS.slice().sort((a,b)=>d(a.start)-d(b.start)).forEach(s=>{
    let placed=false;
    for(const lane of lanes){ if(d(s.start) >= d(lane[lane.length-1].end)){ lane.push(s); placed=true; break; } }
    if(!placed) lanes.push([s]);
  });

  let laneHtml='';
  lanes.forEach(lane=>{
    let bars='';
    lane.forEach(s=>{
      const left=daysBetween(RANGE_START,d(s.start))*cw;
      const w=nights(s)*cw;
      const n=nights(s);
      bars+=`<div class="gbar" data-id="${s.id}" style="left:${left}px;width:${w}px;background:linear-gradient(135deg,${s.color},${s.color}bb)">`+
        `<div class="gnm">${s.name}</div>`+(zoom!=='year'?`<div class="gmeta">${money(total(s))} · ${money(total(s)/n)}/day</div>`:'')+`</div>`;
      if(s.flightIn){ const fl=daysBetween(RANGE_START,d(s.flightIn.date))*cw; bars+=`<div class="gflight" style="left:${fl}px">✈️</div>`; }
    });
    laneHtml+=`<div class="lane">${bars}</div>`;
  });

  const todayLeft = daysBetween(RANGE_START,TODAY)*cw + cw/2;

  canvas.style.width=width+'px';
  canvas.innerHTML=
    `<div class="month-band">${band}</div>`+
    `<div class="day-axis">${axis}</div>`+
    `<div class="lanes"><div class="grid-lines">${glines}</div>`+
    `<div class="today-line" style="left:${todayLeft}px"></div>`+
    laneHtml+`</div>`;

  canvas.querySelectorAll('.gbar').forEach(b=>b.addEventListener('click',()=>{
    const s=STAYS.find(x=>x.id==b.dataset.id); alert(`${s.name}\n${s.city}\n${MOS[d(s.start).getMonth()]} ${d(s.start).getDate()} → ${MOS[d(s.end).getMonth()]} ${d(s.end).getDate()}\nTotal ${money(total(s))} · ${money(total(s)/nights(s))}/day`);
  }));
}

function scrollToMonth(animate=true){
  const cw=ZOOM[zoom];
  const left = daysBetween(RANGE_START, new Date(cursor.getFullYear(),cursor.getMonth(),1))*cw;
  document.getElementById('scroll').scrollTo({left:left-8, behavior:animate?'smooth':'auto'});
  document.getElementById('period-label').textContent=MOF[cursor.getMonth()]+' '+cursor.getFullYear();
  updateFoot();
}
function updateFoot(){
  // stays touching the cursor month
  const mStart=new Date(cursor.getFullYear(),cursor.getMonth(),1);
  const mEnd=new Date(cursor.getFullYear(),cursor.getMonth()+1,0);
  const inMonth=STAYS.filter(s=> d(s.start)<=mEnd && d(s.end)>mStart);
  const spend=inMonth.reduce((a,s)=>a+total(s),0);
  const nts=inMonth.reduce((a,s)=>a+nights(s),0);
  document.getElementById('f-month').textContent=MOS[cursor.getMonth()];
  document.getElementById('f-spend').textContent=money(spend);
  document.getElementById('f-nights').textContent=nts;
  document.getElementById('f-day').textContent=nts?money(spend/nts):'$0';
}

document.querySelectorAll('.view-toggle button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.view-toggle button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); zoom=b.dataset.zoom; build(); scrollToMonth(false);
}));
document.getElementById('prev').addEventListener('click',()=>{ cursor=new Date(cursor.getFullYear(),cursor.getMonth()-1,1); scrollToMonth(); });
document.getElementById('next').addEventListener('click',()=>{ cursor=new Date(cursor.getFullYear(),cursor.getMonth()+1,1); scrollToMonth(); });
document.getElementById('today').addEventListener('click',()=>{ cursor=new Date(TODAY.getFullYear(),TODAY.getMonth(),1); scrollToMonth(); });

// drag-to-pan
const sc=document.getElementById('scroll');
let down=false,sx=0,sl=0;
sc.addEventListener('mousedown',e=>{ if(e.target.closest('.gbar'))return; down=true;sx=e.pageX;sl=sc.scrollLeft;sc.style.cursor='grabbing'; });
window.addEventListener('mouseup',()=>{ down=false;sc.style.cursor=''; });
window.addEventListener('mousemove',e=>{ if(!down)return; sc.scrollLeft=sl-(e.pageX-sx); });

build();
scrollToMonth(false);
</script>
</body>
</html>
