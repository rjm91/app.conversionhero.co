<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — AI Clone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b1020;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #131934;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 48px 36px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .logo {
      width: 140px;
      height: auto;
      margin: 0 auto 28px;
      display: block;
    }
    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #16a34a;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check svg { width: 32px; height: 32px; stroke: #fff; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      color: #aab1c5;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .meta {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: #8a92ab;
      font-size: 13px;
    }
    .home-link {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 22px;
      background: #f5b800;
      color: #0b1020;
      font-weight: 700;
      font-size: 14px;
      border-radius: 10px;
      text-decoration: none;
      transition: filter 0.15s;
    }
    .home-link:hover { filter: brightness(1.08); }
  </style>
</head>
<body>

  <div class="card">
    <img class="logo" src="https://conversionhero.co/assets/logo/ch-logo-white-main.webp.png" alt="ConversionHero" />
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>You're booked!</h1>
    <p>Thanks — we got your call request and will reach out shortly to confirm the time.</p>
    <p>Keep an eye on your inbox (and spam folder) for the calendar invite.</p>

    <div class="meta">
      Need to reschedule? Just reply to the confirmation email.
    </div>

    <a class="home-link" href="https://conversionhero.co">Back to ConversionHero</a>
  </div>

</body>
</html>
