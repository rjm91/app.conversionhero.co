<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Clone — HVAC Beta · ConversionHero</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #010918;
      --text: #ffffff;
      --muted: #9ca3af;
      --accent: #facc15;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .booking-modal {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
    }

    .booking-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
    }

    .booking-info {
      padding: 28px;
      background: #f9fafb;
      border-right: 1px solid #eee;
    }

    .booking-info h2 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .booking-info p {
      font-size: 14px;
      color: #555;
    }

    .booking-main {
      padding: 28px;
    }

    .step-title {
      font-size: 16px;
      font-weight: 800;
      margin: 10px 0;
    }

    .date-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .date-btn, .time-btn {
      padding: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      cursor: pointer;
      font-weight: 700;
    }

    .active {
      background: #111;
      color: #fff;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 8px;
    }

    .form-grid input {
      padding: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .full {
      grid-column: 1/-1;
    }

    .schedule-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      body {
        align-items: flex-start;
        height: auto;
      }

      .booking-modal {
        max-width: 100%;
        border-radius: 0;
      }

      .booking-grid {
        grid-template-columns: 1fr;
      }

      .booking-info {
        border-right: none;
        border-bottom: 1px solid #eee;
      }

      .date-grid {
        grid-template-columns: repeat(2,1fr);
      }

      .time-grid {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="modal-overlay">
  <div class="booking-modal">

    <div class="booking-grid">

      <div class="booking-info">
        <h2>Schedule Your Free Estimate</h2>
        <p>Pick a time that works best.</p>
      </div>

      <div class="booking-main">

        <div class="step-title">Select Date</div>
        <div class="date-grid">
          <button class="date-btn">Mon</button>
          <button class="date-btn">Tue</button>
          <button class="date-btn">Wed</button>
          <button class="date-btn">Thu</button>
          <button class="date-btn">Fri</button>
          <button class="date-btn">Sat</button>
        </div>

        <div class="step-title">Select Time</div>
        <div class="time-grid">
          <button class="time-btn">9:00 AM</button>
          <button class="time-btn">10:30 AM</button>
          <button class="time-btn">12:00 PM</button>
          <button class="time-btn">1:30 PM</button>
          <button class="time-btn">3:00 PM</button>
          <button class="time-btn">4:30 PM</button>
        </div>

        <div class="step-title">Your Info</div>

        <div class="form-grid">
          <input placeholder="First Name">
          <input placeholder="Last Name">
          <input placeholder="Email">
          <input placeholder="Phone">
        </div>

        <button class="schedule-btn" data-track="opt-in">Schedule Call</button>

      </div>

    </div>

  </div>
</div>

<script>
document.querySelectorAll(".date-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".date-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

document.querySelectorAll(".time-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".time-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});
</script>

</body>
</html>
